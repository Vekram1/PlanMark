name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-release-binaries:
    name: build (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    env:
      CGO_ENABLED: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run test suite
        run: go test ./...

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME#v}"
          OUT_DIR="dist/planmark_${VERSION}_${GOOS}_${GOARCH}"
          mkdir -p "${OUT_DIR}"
          go build -trimpath -ldflags "-s -w" -o "${OUT_DIR}/planmark" ./cmd/planmark
          tar -C "${OUT_DIR}" -czf "dist/planmark_${VERSION}_${GOOS}_${GOARCH}.tar.gz" planmark

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz

  publish-release:
    name: publish release
    runs-on: ubuntu-latest
    needs: build-release-binaries
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          shasum -a 256 *.tar.gz > checksums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/checksums.txt
