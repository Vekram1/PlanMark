name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-release-binaries:
    name: build (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive_ext: tar.gz
          - goos: linux
            goarch: arm64
            archive_ext: tar.gz
          - goos: darwin
            goarch: amd64
            archive_ext: tar.gz
          - goos: darwin
            goarch: arm64
            archive_ext: tar.gz
          - goos: windows
            goarch: amd64
            archive_ext: zip
          - goos: windows
            goarch: arm64
            archive_ext: zip
    env:
      CGO_ENABLED: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run test suite
        run: go test ./...

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME#v}"
          OUT_DIR="dist/planmark_${VERSION}_${GOOS}_${GOARCH}"
          mkdir -p "${OUT_DIR}"
          BIN_NAME="planmark"
          if [ "${GOOS}" = "windows" ]; then
            BIN_NAME="planmark.exe"
          fi
          go build -trimpath -ldflags "-s -w" -o "${OUT_DIR}/${BIN_NAME}" ./cmd/planmark
          if [ "${ARCHIVE_EXT}" = "zip" ]; then
            (
              cd "${OUT_DIR}"
              zip -q "../planmark_${VERSION}_${GOOS}_${GOARCH}.zip" "${BIN_NAME}"
            )
          else
            tar -C "${OUT_DIR}" -czf "dist/planmark_${VERSION}_${GOOS}_${GOARCH}.tar.gz" "${BIN_NAME}"
          fi

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  publish-release:
    name: publish release
    runs-on: ubuntu-latest
    needs: build-release-binaries
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          files="$(find . -maxdepth 1 \( -name '*.tar.gz' -o -name '*.zip' \) -print | sort)"
          if [ -z "${files}" ]; then
            echo "No release archives found" >&2
            exit 1
          fi
          shasum -a 256 ${files} > checksums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
