name: ci

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  determinism-matrix:
    name: determinism (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      CGO_ENABLED: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run Determinism Matrix Checks
        run: ./scripts/determinism_matrix.sh

  fuzz-smoke:
    name: fuzz smoke (short budget)
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run Short-Budget Fuzz Smoke
        run: ./scripts/fuzz_ci.sh
